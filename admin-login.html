<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisaanConnect - Administrative Login</title>
    <link rel="manifest" href="manifest.json">
    <!-- ✅ Production env config: sets KISAAN_RENDER_URL for Vercel → Render routing -->
    <script src="env-config.js"></script>
    <!-- ✅ Network utility: auto-discovers server IP, handles Android/PWA/Browser -->
    <script src="kisaan-network.js"></script>
    <meta name="theme-color" content="#0277bd">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="Secure portal for KisaanConnect administrators to manage the indirect marketplace and user data.">
    <meta name="keywords" content="KisaanConnect, Admin, Login, Agriculture, Marketplace Management">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="KisaanConnect - Admin Portal">
    <meta property="og:description" content="Administrative access to KisaanConnect marketplace.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/1211/1211831.png">
    <style>
        :root {
            --primary: #0277bd;
            --primary-dark: #01579b;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        .input-group i { position: absolute; left: 15px; top: 38px; color: var(--text-muted); }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--primary-dark); }

        .lang-switch { margin-top: 25px; display: flex; gap: 10px; justify-content: center; font-size: 12px; }
        .lang-link { color: var(--text-muted); cursor: pointer; }
        .lang-link:hover { color: var(--primary); }
        .lang-link.active { color: var(--primary); font-weight: 700; }

        .back-link { margin-top: 20px; display: block; font-size: 13px; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-user-shield"></i>
            <span>Admin Portal</span>
        </div>
        <p class="subtitle" id="subtitle">KisaanConnect System Management</p>

        <div class="input-group">
            <label id="label-email" for="email">Admin Email</label>
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="admin@kisan.com">
        </div>

        <div class="input-group">
            <label id="label-pass" for="password">Security Key</label>
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="handleLogin()" id="btn-text">Authenticate</button>

        <div style="margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: var(--text-muted); font-weight: 700; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px;">
            <span id="connection-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 8px #ef4444;"></span>
            <span id="server-ip-text">CONNECTING...</span>
        </div>

        <div class="lang-switch">
            <span class="lang-link active" onclick="setLang('en')">EN</span>
            <span class="lang-link" onclick="setLang('hi')">HI</span>
            <span class="lang-link" onclick="setLang('te')">TE</span>
        </div>

        <a href="index.html" class="back-link" id="back-text">← Back to Public Site</a>
    </div>

    <script>
        // Ensure global API_URL is available
        window.API_URL = window.API_URL || 'http://localhost:3000/api';

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        // Initialize KisaanNetwork immediately
        window.onload = async () => {
            if (window.location.protocol === 'file:') {
                alert("⚠️ WARNING: You are opening this file directly. \n\nFor the Admin Portal to work, please open it through the server: \nhttp://localhost:3000/admin-login.html");
            }

            if (window.KisaanNetwork) {
                const url = await KisaanNetwork.init();
                window.API_URL = url;
                console.log("[Admin] 🌐 Connected to:", url);
                KisaanNetwork.startWatchdog();
            }
            updateUI();
        };

        let currentLang = localStorage.getItem('kisaan_lang') || 'en';

        const translations = {
            en: {
                subtitle: "KisanConnect System Management",
                email: "Admin Email",
                pass: "Security Key",
                auth: "Authenticate",
                back: "← Back to Public Site",
                error: "Invalid Admin Credentials"
            },
            hi: {
                subtitle: "किसान कनेक्ट सिस्टम प्रबंधन",
                email: "व्यवस्थापक ईमेल",
                pass: "सुरक्षा कुंजी",
                auth: "प्रमाणित करें",
                back: "← सार्वजनिक साइट पर वापस जाएं",
                error: "अमान्य व्यवस्थापक क्रेडेंशियल"
            },
            te: {
                subtitle: "కిసాన్ కనెక్ట్ సిస్టమ్ మేనేజ్మెంట్",
                email: "అడ్మిన్ ఈమెయిల్",
                pass: "సెక్యూరిటీ కీ",
                auth: "ధృవీకరించు",
                back: "← Back to Public Site",
                error: "Invalid Admin Credentials"
            },
            ta: {
                subtitle: "கிசான் கனெக்ட் சிஸ்டம் மேலாண்மை",
                email: "நிர்வாக மின்னஞ்சல்",
                pass: "பாதுகாப்பு சாவி",
                auth: "அங்கீகரிக்கவும்",
                back: "← பொது தளத்திற்குத் திரும்பு",
                error: "தவறான நிர்வாக விவரங்கள்"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('kisaan_lang', lang);
            updateUI();
        }

        /**
         * Dynamic Translation Helper - Preference for Admin managed strings
         */
        function getT(key) {
            const custom = JSON.parse(localStorage.getItem('kisan_custom_translations') || '{}');
            if (custom[currentLang] && custom[currentLang][key]) {
                return custom[currentLang][key];
            }
            return (translations[currentLang] && translations[currentLang][key]) || (translations['en'][key]);
        }

        function updateUI() {
            const subtitle = document.getElementById('subtitle');
            const labelEmail = document.getElementById('label-email');
            const labelPass = document.getElementById('label-pass');
            const btnText = document.getElementById('btn-text');
            const backText = document.getElementById('back-text');

            if (subtitle) subtitle.textContent = getT('subtitle');
            if (labelEmail) labelEmail.textContent = getT('email');
            if (labelPass) labelPass.textContent = getT('pass');
            if (btnText) btnText.textContent = getT('auth');
            if (backText) backText.textContent = getT('back');

            document.querySelectorAll('.lang-link').forEach(link => {
                link.classList.toggle('active', link.textContent.toLowerCase() === currentLang);
            });
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            // Use discovered API_URL
            const API_URL = window.API_URL;

            const btn = document.querySelector('.btn-login');
            const origText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            try {
                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'bypass-tunnel-reminder': 'kisaanconnect'
                    },
                    body: JSON.stringify({ email, password: pass })
                });

                if (response.ok) {
                    const admin = await response.json();
                    sessionStorage.setItem('current_user', JSON.stringify(admin));
                    window.location.href = 'admin-dashboard.html';
                } else {
                    const data = await response.json().catch(() => ({}));
                    alert(data.message || translations[currentLang].error);
                }
            } catch (error) {
                console.error("API Error:", error);
                alert("❌ Connection Failed\n\nCould not reach the server at:\n" + API_URL + "\n\n1. Ensure the Node.js server is running.\n2. If using mobile, ensure same Wi-Fi.\n3. Try clicking 'Set IP' if using custom address.");
                if (window.KisaanNetwork) KisaanNetwork.showOfflineBanner();
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        }

        updateUI();
    </script>
</body>
</html>
