name: Opt-in Node.js 24 for JavaScript Actions

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

# This workflow sets FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true at workflow level
# which forces JavaScript actions to run on Node.js 24 on the runner.
# Use this to opt in now and avoid deprecation warnings when Node.js 20 is removed.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js (for job steps)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Server Syntax
        run: node -c server.js

      - name: Start KisaanConnect Server
        run: node server.js &

      - name: Wait for Server Startup
        run: sleep 3

      - name: Run E2E Test Runner
        run: node e2e_tests/test_runner.js

      - name: Upload Excel E2E Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-excel-reports
          path: e2e_tests/reports/

      - name: Archive build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build
