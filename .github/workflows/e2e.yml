name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle.properties'
      - 'local.properties'
      - '*.md'
      - '.gitignore'
      - '.vercelignore'
      - '.vscode/**'
      - '.idea/**'
      - 'scratch/**'
      - 'uploads/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle.properties'
      - 'local.properties'
      - '*.md'
      - '.gitignore'
      - '.vercelignore'
      - '.vscode/**'
      - '.idea/**'
      - 'scratch/**'
      - 'uploads/**'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js (for job steps)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pandas openpyxl

      - name: Install Node dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Server Syntax
        run: node -c server.js

      - name: Start KisaanConnect Server
        run: node server.js &

      - name: Wait for Server Startup
        run: sleep 3

      - name: Run E2E Test Runner
        run: node e2e_tests/test_runner.js

      - name: Upload Excel E2E Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-excel-reports
          path: e2e_tests/reports/
          retention-days: 30

      - name: Archive build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/deploy-pages@v4
