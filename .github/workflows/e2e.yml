name: KisaanConnect E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'app/**'
      - 'gradle/**'
      - '*.md'
      - '.gitignore'
      - '.idea/**'
      - '.vscode/**'
      - 'uploads/**'
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

# ───────────────────────────────────────────────────────────
# HELPER: server startup (reused in every job)
# ───────────────────────────────────────────────────────────
jobs:

# ═══════════════════════════════════════════════════════════
# JOB 1 — Selenium Web Tests (50 cases)
# ═══════════════════════════════════════════════════════════
  selenium-web-tests:
    name: "🌐 Selenium — Website Tests (50)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Selenium + ChromeDriver
        run: npm install selenium-webdriver chromedriver --no-save

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create CI environment
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000"     >> .env

      - name: Start KisaanConnect server
        run: node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && echo "✅ Server ready" && break
            echo "  ⏳ Waiting... ($i/20)"; sleep 3
          done

      - name: Run Selenium Web Tests (50 cases)
        env:
          BASE_URL: http://localhost:3000
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/selenium/web_e2e.test.js

      - name: Upload Selenium CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: e2e_tests/reports/Selenium_Report.csv
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 2 — Appium Android Tests (50 cases)
# ═══════════════════════════════════════════════════════════
  appium-android-tests:
    name: "📱 Appium — Android Tests (50)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Create CI environment
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000"     >> .env

      - name: Start KisaanConnect server
        run: node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && echo "✅ Server ready" && break
            echo "  ⏳ Waiting... ($i/20)"; sleep 3
          done

      - name: Run Appium Android Tests (50 cases)
        env:
          BASE_URL: http://localhost:3000
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/appium/mobile_e2e.test.js

      - name: Upload Appium CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: e2e_tests/reports/Appium_Report.csv
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 3 — Unit Tests (30 cases)
# ═══════════════════════════════════════════════════════════
  unit-tests:
    name: "🔬 Unit Tests — API (30)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Create CI environment
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000"     >> .env

      - name: Start KisaanConnect server
        run: node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && echo "✅ Server ready" && break
            echo "  ⏳ Waiting... ($i/20)"; sleep 3
          done

      - name: Run Unit Tests (30 cases)
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/unit/unit_tests.js

      - name: Upload Unit CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: e2e_tests/reports/Unit_Report.csv
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 4 — Validation Tests (25 cases)
# ═══════════════════════════════════════════════════════════
  validation-tests:
    name: "✅ Validation Tests (25)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Create CI environment
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000"     >> .env

      - name: Start KisaanConnect server
        run: node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && echo "✅ Server ready" && break
            echo "  ⏳ Waiting... ($i/20)"; sleep 3
          done

      - name: Run Validation Tests (25 cases)
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/validation/validation_tests.js

      - name: Upload Validation CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: e2e_tests/reports/Validation_Report.csv
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 5 — Deployment Status Tests (15 cases)
# ═══════════════════════════════════════════════════════════
  deployment-tests:
    name: "🚀 Deployment Status (15)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Create CI environment
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000"     >> .env

      - name: Build dist (needed for dist/ checks)
        run: npm run build

      - name: Start KisaanConnect server
        run: node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && echo "✅ Server ready" && break
            echo "  ⏳ Waiting... ($i/20)"; sleep 3
          done

      - name: Run Deployment Status Tests (15 cases)
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/deployment/deployment_status.js

      - name: Upload Deployment CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: e2e_tests/reports/Deployment_Report.csv
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 6 — Compile All → Master Summary → GitHub Pages
# ═══════════════════════════════════════════════════════════
  compile-and-deploy:
    name: "📊 Compile Master Report & Deploy"
    runs-on: ubuntu-latest
    needs: [selenium-web-tests, appium-android-tests, unit-tests, validation-tests, deployment-tests]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Download Selenium Report
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-report
          path: e2e_tests/reports/
        continue-on-error: true

      - name: Download Appium Report
        uses: actions/download-artifact@v4
        with:
          name: appium-android-report
          path: e2e_tests/reports/
        continue-on-error: true

      - name: Download Unit Report
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: e2e_tests/reports/
        continue-on-error: true

      - name: Download Validation Report
        uses: actions/download-artifact@v4
        with:
          name: validation-test-report
          path: e2e_tests/reports/
        continue-on-error: true

      - name: Download Deployment Report
        uses: actions/download-artifact@v4
        with:
          name: deployment-test-report
          path: e2e_tests/reports/
        continue-on-error: true

      - name: Compile Master Summary (CSV + GitHub Step Summary table)
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: node e2e_tests/test_runner.js

      - name: Build frontend
        run: npm run build

      - name: Copy reports to dist
        run: |
          cp e2e_tests/reports/E2E_Test_Report.csv dist/ 2>/dev/null || true

      - name: Upload combined CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: e2e_tests/reports/E2E_Test_Report.csv
          retention-days: 30

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/deploy-pages@v4
